<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectaHQ — Launchpad</title>
  <meta name="description" content="Adaptive, usage-prioritized launchpad for the ConnectaHQ enterprise Telecom SaaS platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/launchpad.css" />
</head>
<body>
  <!-- animated telco background (network constellation) -->
  <canvas id="network-canvas" class="network-canvas" aria-hidden="true"></canvas>
  <div class="background-veil" aria-hidden="true"></div>

  <header class="top-bar">
    <div class="top-bar__inner">
      <a class="brand-mark" href="#">ConnectaHQ</a>

      <div class="global-search">
        <span class="global-search__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.7"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </span>
        <input class="global-search__input" type="search"
               placeholder="Search 15+ modules, actions, accounts…"
               aria-label="Search modules and actions" />
        <kbd class="global-search__kbd" aria-hidden="true">⌘K</kbd>
      </div>

      <div class="motion-control">
        <button id="motion-toggle" class="motion-toggle" type="button" aria-pressed="false"
                title="Pause the animated background for accessibility (WCAG 2.2.2)">
          <span class="motion-toggle__icon" aria-hidden="true"></span>
          <span class="motion-toggle__label">Pause motion</span>
        </button>
        <span id="motion-hint" class="motion-hint" role="status"></span>
      </div>

      <div class="user-chip">
        <span class="user-chip__avatar" aria-hidden="true">AK</span>
        <span class="user-chip__id">
          <span class="user-chip__name">Aftab K.</span>
          <span class="user-chip__role">NetOps Lead</span>
        </span>
      </div>
    </div>
  </header>

  <main class="launchpad-shell">
    <!-- greeting + operational pulse -->
    <section class="greeting-row">
      <div class="greeting">
        <p class="greeting__eyebrow">Friday · 6 June 2026 · 09:12</p>
        <h1 class="greeting__title">Welcome back, Aftab</h1>
        <p class="greeting__subtitle">Here's what needs you across your most-used modules.</p>
      </div>
      <div class="pulse" aria-label="Today's operational pulse">
        <p class="pulse__title">Today's Operational Pulse</p>
        <div id="pulse-grid" class="pulse__grid"></div>
      </div>
    </section>

    <!-- Priority / Recent Modules -->
    <section aria-labelledby="priority-heading">
      <div class="section-head">
        <div class="section-head__lead section-head__lead--stack">
          <h2 id="priority-heading" class="section-head__title">Priority Modules</h2>
          <div id="sorted-by" class="sorted-by" role="group" aria-label="Ranking signals — click a chip to toggle"></div>
        </div>
        <span class="section-head__hint">Hover a card for quick actions</span>
      </div>
      <div id="priority-grid" class="priority-grid"></div>
    </section>

    <!-- Directory + Alerts -->
    <div class="workspace-grid">
      <section class="workspace-grid__main" aria-labelledby="directory-heading">
        <div class="section-head">
          <div class="section-head__lead">
            <h2 id="directory-heading" class="section-head__title">Global Module Directory</h2>
            <span class="directory-count" id="directory-count"></span>
          </div>
        </div>
        <div id="directory-filters" class="directory-filters" role="tablist" aria-label="Filter modules by category"></div>
        <div id="directory-grid" class="directory-grid"></div>
      </section>

      <aside class="workspace-grid__rail" aria-labelledby="alerts-heading">
        <div class="section-head">
          <h2 id="alerts-heading" class="section-head__title">System Alerts</h2>
          <span class="alerts-badge" id="alerts-badge"></span>
        </div>
        <div class="alerts-rail">
          <div id="alerts-list" role="list"></div>
        </div>
      </aside>
    </div>
  </main>

  <!-- module detail drawer (rendered on demand) -->
  <div id="drawer-root" class="drawer-root" aria-hidden="true"></div>

  <script src="js/modules-data.js"></script>
  <script src="js/module-detail.js"></script>
  <script src="js/network-background.js"></script>
  <script src="js/launchpad.js"></script>
</body>
</html>
